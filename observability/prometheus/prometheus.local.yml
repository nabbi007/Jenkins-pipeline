global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:3000

  - job_name: node_exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121
